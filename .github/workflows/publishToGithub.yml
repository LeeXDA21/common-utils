name: Publish Common Utils Package

on:
  push:
    branches: [ main ]
    paths: [ 'gradle/libs.versions.toml' ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  check-and-publish:
    env:
      GH_USERNAME: ${{ github.actor }}
      GH_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPOSITORY_OWNER: ${{ github.repository_owner }}
      GH_REPOSITORY_NAME: ${{ github.event.repository.name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle and wrapper
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Check if version changed
        id: check_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PREV_COMMIT=$(git rev-parse HEAD^)
          OLD_LINE=$(git show $PREV_COMMIT:gradle/libs.versions.toml | grep '^common-utils =' | xargs)
          NEW_LINE=$(grep '^common-utils =' gradle/libs.versions.toml | xargs)
          echo "Old: $OLD_LINE"
          echo "New: $NEW_LINE"
          if [ "$OLD_LINE" != "$NEW_LINE" ] && [ -n "$NEW_LINE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Publish to GitHub Packages
        if: steps.check_version.outputs.changed == 'true'
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository

      - name: Generate Dokka docs
        if: steps.check_version.outputs.changed == 'true'
        run: ./gradlew dokkaGeneratePublicationHtml

      - name: Configure GitHub Pages
        if: steps.check_version.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.check_version.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: lib/build/dokka/html

      - name: Deploy docs to GitHub Pages
        if: steps.check_version.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
